<!DOCTYPE html>
<html>
<head>
<title>Brick Breaker</title>

<style>
body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:black;
display:block;
margin:auto;
}
</style>

</head>

<body>

<h1>Brick Breaker</h1>

<canvas id="game" width="480" height="320"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let x=240
let y=160
let dx=2
let dy=-2

let paddleHeight=10
let paddleWidth=80
let paddleX=(canvas.width-paddleWidth)/2

let right=false
let left=false

let bricks=[]
let rows=5
let cols=8
let brickW=50
let brickH=15

for(let r=0;r<rows;r++){
bricks[r]=[]
for(let c=0;c<cols;c++){
bricks[r][c]={x:0,y:0,status:1}
}
}

document.addEventListener("keydown",keyDown)
document.addEventListener("keyup",keyUp)

function keyDown(e){
if(e.key==="Right"){right=true}
if(e.key==="Left"){left=true}
}

function keyUp(e){
if(e.key==="Right"){right=false}
if(e.key==="Left"){left=false}
}

function drawBall(){
ctx.beginPath()
ctx.arc(x,y,6,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()
ctx.closePath()
}

function drawPaddle(){
ctx.fillStyle="white"
ctx.fillRect(paddleX,canvas.height-paddleHeight,paddleWidth,paddleHeight)
}

function drawBricks(){

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(bricks[r][c].status==1){

let brickX=c*(brickW+10)+30
let brickY=r*(brickH+10)+30

bricks[r][c].x=brickX
bricks[r][c].y=brickY

ctx.fillStyle="orange"
ctx.fillRect(brickX,brickY,brickW,brickH)

}

}
}

}

function collision(){

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

let b=bricks[r][c]

if(b.status==1){

if(x>b.x && x<b.x+brickW && y>b.y && y<b.y+brickH){

dy=-dy
b.status=0

}

}

}
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBall()
drawPaddle()
drawBricks()

collision()

if(x+dx>canvas.width-6 || x+dx<6){
dx=-dx
}

if(y+dy<6){
dy=-dy
}

else if(y+dy>canvas.height-6){

if(x>paddleX && x<paddleX+paddleWidth){
dy=-dy
}else{
alert("Game Over")
document.location.reload()
}

}

if(right && paddleX<canvas.width-paddleWidth){
paddleX+=4
}

if(left && paddleX>0){
paddleX-=4
}

x+=dx
y+=dy

}

setInterval(draw,10)

</script>

</body>
</html>
